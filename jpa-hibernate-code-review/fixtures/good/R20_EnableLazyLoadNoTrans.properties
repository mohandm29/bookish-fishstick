# CORRECT: hibernate.enable_lazy_load_no_trans is NOT set (or explicitly false).
# When true, Hibernate opens a temporary session per lazy access — masking N+1
# bugs, blowing through connection-pool budgets, and producing one tiny TX per
# proxy resolution.
#
# spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false   # default — leave it alone

# Instead, fetch eagerly in the service layer using JOIN FETCH or @EntityGraph:
#
# @Query("select p from Post p left join fetch p.comments where p.id = :id")
# Optional<Post> findByIdWithComments(@Param("id") Long id);

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
