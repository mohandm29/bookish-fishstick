# CORRECT: OSIV disabled. The web layer cannot trigger silent lazy loads on
# detached entities — all fetches must be performed inside the service-layer
# transaction, surfacing N+1 problems at development time instead of hiding them.
spring:
  jpa:
    open-in-view: false

